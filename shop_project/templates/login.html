{% extends 'base.html' %}

{% block title %}Вход в систему{% endblock %}

{% block content %}
<div class="card" style="max-width: 420px; margin: 2rem auto;">
    <h1 class="page-title" style="text-align: center;">Вход в систему</h1>
    
    {% if form.errors %}
    <div class="alert alert-danger">
        ⚠️ Неверное имя пользователя или пароль.
    </div>
    {% endif %}
    
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_username">Имя пользователя</label>
            <input type="text" name="username" id="id_username" class="form-control" required autofocus>
        </div>
        <div class="form-group">
            <label for="id_password">Пароль</label>
            <input type="password" name="password" id="id_password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%;">Войти</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem; color: var(--muted);">
        Нет аккаунта? <a href="/register/" style="color: var(--primary);">Зарегистрироваться</a>
    </p>
</div>
{% endblock %}
