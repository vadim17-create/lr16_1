{% extends "base.html" %}
{% block title %}Заказ оформлен — SALMO Shop{% endblock %}
{% block content %}

<div style="max-width:560px; margin:3rem auto; text-align:center;">
    <div class="card" style="padding:3rem 2rem;">
        <div style="width:80px; height:80px; background:#d1e7dd; border-radius:50%;
                    display:flex; align-items:center; justify-content:center;
                    font-size:2.5rem; margin:0 auto 1.5rem;">✅</div>
        <h1 style="font-size:1.8rem; font-weight:800; color:#0f5132; margin-bottom:.8rem;">
            Заказ успешно оформлен!
        </h1>
        <p style="color:#6c757d; font-size:1rem; line-height:1.6; margin-bottom:2rem;">
            Спасибо за покупку. Мы свяжемся с вами в ближайшее время для подтверждения заказа и уточнения деталей доставки.
        </p>
        <a href="/catalog/" class="btn btn-primary btn-lg">🛍 Продолжить покупки</a>
    </div>
</div>

{% endblock %}
